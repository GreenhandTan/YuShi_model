name: Release Deploy Packages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'api_server.py'
      - 'infer_onnx.py'
      - 'tokenizer_min.py'
      - 'run_api.sh'
      - 'run_infer.sh'
      - 'requirements-deploy-cpu.txt'
      - 'requirements-deploy-gpu.txt'
      - 'checkpoints/model.onnx'
      - 'checkpoints/vocab.json'
      - 'web_test/index.html'
      - 'web_test/server.py'
      - '.github/workflows/release_deploy_packages.yml'

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare release metadata
        run: |
          echo "RELEASE_DATE=$(date +'%Y%m%d')" >> "$GITHUB_ENV"
          echo "TAG_NAME=deploy-${GITHUB_RUN_NUMBER}-$(date +'%Y%m%d')" >> "$GITHUB_ENV"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f api_server.py ]]; then
            echo "api_server.py not found. Are we in the root directory?"
            exit 1
          fi

          # Create a temp deploy directory and organize core files
          mkdir -p staging_deploy/checkpoints staging_deploy/web_test staging_deploy/logs
          
          # Copy scripts and core files
          cp api_server.py infer_onnx.py tokenizer_min.py run_api.sh run_infer.sh requirements-deploy-cpu.txt requirements-deploy-gpu.txt staging_deploy/ || true
          
          # Copy checkpoints
          cp checkpoints/model.onnx checkpoints/vocab.json staging_deploy/checkpoints/ || true
          
          # Copy Web UI components
          cp web_test/index.html web_test/server.py staging_deploy/web_test/ || true

          mkdir -p release_assets

          # Archive from the staging_deploy directory
          pushd staging_deploy
          zip -r "../release_assets/deploy_${RELEASE_DATE}.zip" . -x "*/__pycache__/*" "*.pyc"
          tar -czf "../release_assets/deploy_${RELEASE_DATE}.tar.gz" .
          popd

          ls -lh release_assets

      - name: Generate checksums
        run: |
          sha256sum release_assets/* > release_assets/checksums.txt
          cat release_assets/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: YuShi_model ${{ env.RELEASE_DATE }}
          draft: false
          prerelease: false
          body: |
