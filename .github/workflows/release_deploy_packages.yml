name: Release Deploy Packages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'deploy/**'
      - '.github/workflows/release_deploy_packages.yml'

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release metadata
        run: |
          echo "RELEASE_DATE=$(date +'%Y%m%d')" >> "$GITHUB_ENV"
          echo "TAG_NAME=deploy-${GITHUB_RUN_NUMBER}-$(date +'%Y%m%d')" >> "$GITHUB_ENV"

      - name: Build release archives from deploy directory
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f deploy/api_server.py ]]; then
            echo "deploy source files not found. Please commit deploy directory first."
            exit 1
          fi

          mkdir -p release_assets

          zip -r "release_assets/deploy_${RELEASE_DATE}.zip" deploy \
            -x "*/__pycache__/*" "*.pyc"
          tar -czf "release_assets/deploy_${RELEASE_DATE}.tar.gz" deploy

          ls -lh release_assets

      - name: Generate checksums
        run: |
          sha256sum release_assets/* > release_assets/checksums.txt
          cat release_assets/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Deploy Package ${{ env.RELEASE_DATE }}
          draft: false
          prerelease: false
          body: |
            ## 部署包发布

            本次发布由 `deploy/` 目录自动打包生成。

            - 资产文件由工作流自动打包并附加发布日期后缀
            - 同时包含 ZIP 与 TAR.GZ 两种格式
            - 附带 checksums.txt 用于完整性校验

            ## 部署步骤（ONNX 推理）

            1. 下载并解压 `deploy_*.zip` 或 `deploy_*.tar.gz`
            2. 进入解压目录（目录内应包含 `api_server.py`、`infer_onnx.py`、`checkpoints/model.onnx`）
            3. 安装依赖并启动服务

            CPU:
            ```bash
            pip install -r requirements-cpu.txt
            bash run_api.sh --port 8000
            ```

            GPU:
            ```bash
            pip install -r requirements-gpu.txt
            bash run_api.sh --port 8000 --onnx_gpu
            ```

            4. 健康检查
            ```bash
            curl http://127.0.0.1:8000/health
            ```

            5. 单条审核测试
            ```bash
            curl -X POST http://127.0.0.1:8000/audit \
              -H "Content-Type: application/json" \
              -d '{"text":"代发兼职日结，私聊我"}'
            ```

            下载后建议先校验：
            ```bash
            sha256sum -c checksums.txt
            ```
          files: |
            release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
