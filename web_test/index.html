<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>御史模型 - web_test 本地审核测试</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --ink: #1f2937;
            --sub: #6b7280;
            --brand: #0f766e;
            --brand-2: #0ea5a4;
            --danger: #dc2626;
            --ok: #16a34a;
            --border: #dbe5ef;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: radial-gradient(1200px 700px at 0% -10%, #d8f4ef 0%, var(--bg) 60%);
            color: var(--ink);
        }

        .wrap {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .header {
            background: linear-gradient(120deg, var(--brand), var(--brand-2));
            color: #fff;
            border-radius: 14px;
            padding: 16px 20px;
            box-shadow: 0 12px 30px rgba(15, 118, 110, 0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
        }

        .header p {
            margin: 6px 0 0;
            opacity: 0.95;
            font-size: 14px;
        }

        .panel {
            margin-top: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .chat {
            height: 520px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbfd 100%);
        }

        .msg {
            max-width: 80%;
            padding: 10px 12px;
            border-radius: 10px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid transparent;
        }

        .user {
            align-self: flex-end;
            background: #e6fffb;
            border-color: #99f6e4;
        }

        .bot {
            align-self: flex-start;
            background: #fff;
            border-color: #e5e7eb;
        }

        .meta {
            font-size: 12px;
            color: var(--sub);
            margin-top: 6px;
        }

        .danger {
            color: var(--danger);
        }

        .ok {
            color: var(--ok);
        }

        .input-bar {
            border-top: 1px solid var(--border);
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            background: #fff;
        }

        textarea {
            width: 100%;
            resize: vertical;
            min-height: 52px;
            max-height: 180px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font: inherit;
            outline: none;
        }

        textarea:focus {
            border-color: var(--brand-2);
        }

        button {
            border: 0;
            border-radius: 10px;
            background: var(--brand);
            color: #fff;
            padding: 0 18px;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            color: var(--sub);
            font-size: 13px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px 10px;
            background: #fff;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <h1>御史模型 web_test 本地聊天审核测试</h1>
            <p>连接本地服务: http://127.0.0.1:8000/audit (通过本地代理转发)</p>
        </div>

        <div class="toolbar">
            <span class="pill">测试入口: http://127.0.0.1:8090</span>
            <span id="status" class="pill">状态: 就绪</span>
        </div>

        <div class="panel">
            <div id="chat" class="chat"></div>
            <div class="input-bar">
                <textarea id="input" placeholder="输入待审核文本，Enter发送，Shift+Enter换行"></textarea>
                <button id="sendBtn">发送审核</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');

        function addMessage(text, role, extraHtml = '') {
            const node = document.createElement('div');
            node.className = `msg ${role}`;
            node.innerHTML = `${escapeHtml(text)}${extraHtml ? `<div class="meta">${extraHtml}</div>` : ''}`;
            chat.appendChild(node);
            chat.scrollTop = chat.scrollHeight;
        }

        function escapeHtml(str) {
            return str
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        function setBusy(busy, text) {
            sendBtn.disabled = busy;
            statusEl.textContent = `状态: ${text}`;
        }

        async function sendAudit() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            setBusy(true, '审核中...');

            try {
                const resp = await fetch('/api/audit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!resp.ok) {
                    const err = await resp.text();
                    addMessage('请求失败', 'bot', `<span class="danger">HTTP ${resp.status}</span> ${escapeHtml(err)}`);
                } else {
                    const data = await resp.json();
                    const v = data.is_violation ? '<span class="danger">违规</span>' : '<span class="ok">合规</span>';
                    const meta = [
                        `判定: ${v}`,
                        `风险: ${escapeHtml(String(data.risk_level || '-'))}`,
                        `类型: ${escapeHtml(String(data.violation_type || '-'))}`,
                        `置信度: ${Number(data.confidence || 0).toFixed(4)}`
                    ].join(' | ');

                    addMessage(
                        data.reason || '已完成审核。',
                        'bot',
                        meta
                    );
                }
            } catch (e) {
                addMessage('无法连接测试服务，请确认 local_test/server.py 已启动。', 'bot', `<span class="danger">${escapeHtml(String(e))}</span>`);
            } finally {
                setBusy(false, '就绪');
            }
        }

        sendBtn.addEventListener('click', sendAudit);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendAudit();
            }
        });

            addMessage('欢迎使用御史模型 web_test 测试页。请输入文本并发送进行内容审核。', 'bot');
    </script>
</body>

</html>
